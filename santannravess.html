/* FUNDO RAVE */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, #ff00cc, #00ffff, #ffcc00, #ff0066);
  animation: bg 10s linear infinite;
  z-index: -1;
}

@keyframes bg {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

header {
  text-align: center;
  padding: 20px;
  font-size: 30px;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 15px;
  padding: 15px;
}

/* CARD */
.card {
  background: rgba(0,0,0,0.7);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 15px #ff00ff;
}

/* IMG */
img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

/* INFO */
.info {
  text-align: center;
  padding: 8px;
}

button {
  background: linear-gradient(45deg, #ff00cc, #00ffff);
  border: none;
  padding: 8px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

/* WHATS */
.whatsapp {

  bottom: 20px;

  padding: 15px;
  border-radius: 50px;

}
